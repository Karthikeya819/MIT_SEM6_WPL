<!DOCTYPE html>
<html>
  <head>
    <title>Bill</title>
  </head>
  <body>
    <h2>Bill Details</h2>

    <table border="1">
      <tr>
        <th>Brand</th>
        <th>Device</th>
        <th>Quantity</th>
        <th>Amount</th>
      </tr>

      {% for item in items %}
        <tr>
          <td>{{ item.brand }}</td>
          <td>{{ item.device }}</td>
          <td>{{ item.quantity }}</td>
          <td>{{ item.amount }}</td>
        </tr>
      {% endfor %}
    </table>

    <h3>Total Amount: {{ total }}</h3>
  </body>
</html>
