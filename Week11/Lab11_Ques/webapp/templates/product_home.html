<h2>Product List</h2>
<ul>
    {% for product in products %}
        <li>
            <strong>{{ product.title }}</strong> - ${{ product.price }}
            <p>{{ product.description }}</p>
        </li>
    {% empty %}
        <li>No products found.</li>
    {% endfor %}
</ul>
<a href="{% url 'create_product' %}">Add a Product</a>
