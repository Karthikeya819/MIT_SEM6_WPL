<!DOCTYPE html>
<html>
<head>
    <title>Website Directory</title>
</head>
<body>
    <h1>Website Directory</h1>

    <h2>Categories</h2>
    <ul>
        {% for category in categories %}
            <li>
                {{ category.name }} 
                (Likes: {{ category.likes }}, Visits: {{ category.visits }})
            </li>
        {% endfor %}
    </ul>

    <h2>Pages</h2>
    <ul>
        {% for page in pages %}
            <li>
                <a href="{{ page.url }}">{{ page.title }}</a> 
                (Views: {{ page.views }})
            </li>
        {% endfor %}
    </ul>

    <a href="{% url 'add_category' %}">Add Category</a><br>
    <a href="{% url 'add_page' %}">Add Page</a>
</body>
</html>
